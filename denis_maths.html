<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denis · mathématiques</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#faf8f4;--bg2:#f0ebe2;--bg3:#e8dfd0;
  --ink:#1a1814;--ink2:#6b6760;--ink3:#b5b2ac;
  --sage:#7a9e87;--blush:#e8a598;--amber:#c8a870;--lav:#a89ec8;
  --line:rgba(26,24,20,0.08);
}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}
#s-home{align-items:center;justify-content:center;padding:2rem 1.5rem;gap:0;}
.home-logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.1em;color:var(--ink3);margin-bottom:4px;}
.home-title{font-family:'DM Mono',monospace;font-size:42px;font-weight:300;color:var(--ink);margin-bottom:4px;}
.home-sub{font-size:13px;color:var(--ink2);margin-bottom:2rem;font-weight:300;text-align:center;max-width:440px;line-height:1.6;}
.chap-list{max-width:520px;width:100%;display:flex;flex-direction:column;}
.chap-section{margin-bottom:1.5rem;}
.chap-section-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--line);}
.chap-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);cursor:pointer;transition:opacity 0.12s;}
.chap-row:last-child{border-bottom:none;}
.chap-row:hover{opacity:0.5;}
.chap-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);min-width:20px;}
.chap-name{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink);flex:1;}
.chap-level{font-size:10px;color:var(--ink3);padding:1px 8px;border-radius:999px;border:1px solid var(--line);}
.chap-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);}
.topbar{display:flex;align-items:center;gap:10px;padding:0.7rem 1.5rem;border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:0;z-index:50;}
.btnback{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);border:none;background:none;cursor:pointer;padding:0;}
.btnback:hover{color:var(--ink);}
.tmod{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink2);}
.spacer{flex:1;}
.pts{font-family:'DM Mono',monospace;font-size:11px;color:var(--sage);background:rgba(122,158,135,0.1);padding:3px 10px;border-radius:999px;border:1px solid rgba(122,158,135,0.2);}
.dots-row{display:flex;gap:3px;padding:0.4rem 1.5rem;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--bg3);border:1px solid var(--line);transition:all 0.3s;}
.dot.done{background:var(--sage);border-color:var(--sage);}
.dot.cur{background:var(--ink);border-color:var(--ink);transform:scale(1.3);}
.gbody{flex:1;display:grid;grid-template-columns:1fr 280px;}
@media(max-width:640px){.gbody{grid-template-columns:1fr;}.gright{border-left:none;border-top:1px solid var(--line);}}
.gleft{padding:1.5rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto;border-right:1px solid var(--line);}
.gright{padding:1.1rem;display:flex;flex-direction:column;align-items:center;gap:0.9rem;background:var(--bg2);}
.ctag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;color:var(--ink3);text-transform:uppercase;}
.ccard{background:white;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.ccard-top{display:flex;align-items:center;gap:5px;padding:6px 11px;border-bottom:1px solid var(--line);background:var(--bg2);}
.cdot{width:7px;height:7px;border-radius:50%;}
.cbody{padding:0.9rem 1.1rem;font-family:'DM Mono',monospace;font-size:12px;line-height:1.95;color:var(--ink2);white-space:pre-wrap;}
.cbody .hl{color:var(--ink);font-weight:500;}
.cbody .cm{color:var(--ink3);font-style:italic;}
.cbody .kw{color:var(--sage);}
.cbody .r{color:#c85a5a;}
.cbody .b{color:#5a7ec8;}
.cbody .ex{display:block;background:var(--bg2);border:1px solid var(--line);border-radius:5px;padding:6px 10px;margin:4px 0;font-size:11.5px;line-height:1.7;color:var(--ink);}
.cbody .why{display:block;background:rgba(168,158,200,0.1);border:1px solid rgba(168,158,200,0.3);border-radius:5px;padding:6px 10px;margin:4px 0;font-size:11.5px;color:#4a4470;line-height:1.6;}
.qbadge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.08em;text-transform:uppercase;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--ink3);display:inline-block;margin-bottom:6px;}
.qbadge.open{border-color:rgba(168,158,200,0.4);color:#4a4470;background:rgba(168,158,200,0.08);}
.qbadge.qcm{border-color:rgba(122,158,135,0.4);color:#3d6b4f;background:rgba(122,158,135,0.08);}
.qtext{font-size:14.5px;font-weight:400;color:var(--ink);line-height:1.6;}
.choices{display:flex;flex-direction:column;gap:5px;}
.choice{padding:9px 13px;border-radius:8px;border:1px solid var(--line);background:white;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;text-align:left;transition:all 0.11s;line-height:1.5;}
.choice:hover:not(:disabled){border-color:var(--ink3);background:var(--bg2);}
.choice.ok{background:rgba(122,158,135,0.1);border-color:var(--sage);color:#3d6b4f;}
.choice.no{background:rgba(232,165,152,0.1);border-color:var(--blush);color:#8b4a3e;}
.choice.dim{opacity:0.3;cursor:default;}
.open-wrap{display:flex;gap:7px;align-items:center;}
.open-input{flex:1;font-family:'DM Mono',monospace;font-size:13px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:white;color:var(--ink);outline:none;}
.open-input:focus{border-color:var(--lav);}
.open-btn{font-family:'DM Mono',monospace;font-size:11px;padding:9px 14px;border-radius:8px;background:var(--ink);color:var(--bg);border:none;cursor:pointer;}
.open-btn:hover{opacity:0.75;}
.fb{font-family:'DM Mono',monospace;font-size:11.5px;color:var(--ink2);line-height:1.7;padding:8px 12px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);display:none;}
.fb.show{display:block;}
.fb.ok{border-color:rgba(122,158,135,0.35);color:#3d6b4f;background:rgba(122,158,135,0.07);}
.fb.no{border-color:rgba(232,165,152,0.35);color:#8b4a3e;background:rgba(232,165,152,0.07);}
.fb.hint{border-color:rgba(200,168,112,0.35);color:#7a5e1e;background:rgba(200,168,112,0.07);}
.gactions{display:flex;gap:7px;align-items:center;}
.btnext{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.06em;padding:7px 16px;border-radius:999px;background:var(--ink);color:var(--bg);border:none;cursor:pointer;display:none;}
.btnext:hover{opacity:0.75;}
.btnext.show{display:block;}
.btnhint{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);border:1px solid var(--line);background:none;border-radius:999px;padding:7px 12px;cursor:pointer;}
.btnhint:hover{color:var(--ink2);}
.glbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.08em;color:var(--ink3);text-transform:uppercase;align-self:flex-start;}
.grid-outer{background:white;border:1px solid var(--line);border-radius:11px;padding:6px;}
.grid{display:grid;grid-template-columns:repeat(6,36px);grid-template-rows:repeat(6,36px);gap:2px;}
.gcell{width:36px;height:36px;border-radius:5px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.2s;}
.gcell.trace{background:rgba(122,158,135,0.1);}
.gcell.trace::after{content:'·';color:var(--sage);font-size:15px;}
.gcell.goal{background:rgba(122,158,135,0.12);}
.gcell.robot{background:transparent;}
.mlog{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);align-self:flex-start;min-height:14px;}
.win{display:none;position:fixed;inset:0;background:rgba(250,248,244,0.97);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:1.1rem;padding:2rem;text-align:center;overflow-y:auto;}
.win.show{display:flex;}
.win-robot{font-size:36px;animation:bob 2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.win-title{font-family:'DM Mono',monospace;font-size:14px;color:var(--ink);}
.win-msgs{background:white;border:1px solid var(--line);border-radius:11px;padding:1rem 1.3rem;text-align:left;max-width:480px;width:100%;}
.win-msgs-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:9px;}
.win-msgs ul{list-style:none;display:flex;flex-direction:column;gap:6px;}
.win-msgs li{font-family:'DM Mono',monospace;font-size:11.5px;color:var(--ink2);line-height:1.6;padding-left:13px;position:relative;}
.win-msgs li::before{content:'→';position:absolute;left:0;color:var(--sage);}
.win-btns{display:flex;gap:7px;}
.btn-restart{font-family:'DM Mono',monospace;font-size:11px;padding:8px 18px;border-radius:999px;background:var(--ink);color:var(--bg);border:none;cursor:pointer;}
.btn-restart:hover{opacity:0.75;}
.btn-menu{font-family:'DM Mono',monospace;font-size:11px;padding:8px 18px;border-radius:999px;background:none;color:var(--ink2);border:1px solid var(--line);cursor:pointer;}
.btn-menu:hover{border-color:var(--ink3);color:var(--ink);}
.pt{position:fixed;pointer-events:none;border-radius:50%;animation:fup 1s ease-out forwards;z-index:999;}
@keyframes fup{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-55px) scale(0);opacity:0}}
</style>
</head>
<body>

<div class="screen active" id="s-home">
  <div class="home-logo">denis · mathématiques</div>
  <div class="home-title">mathématiques</div>
  <div class="home-sub">12 chapitres · du zéro absolu au niveau licence<br>atome → liaisons → thermo → équilibres → cinétique → solutions → redox → gaz → nucléaire → stœchiométrie</div>
  <div class="chap-list" id="chap-list"></div>
</div>

<div class="screen" id="s-game">
  <div class="topbar">
    <button class="btnback" onclick="goHome()">← chimie</button>
    <span style="color:var(--ink3);font-size:12px;">/</span>
    <span class="tmod" id="g-title"></span>
    <div class="spacer"></div>
    <span class="pts" id="g-pts">0 pts</span>
  </div>
  <div class="dots-row" id="dots-row"></div>
  <div class="gbody">
    <div class="gleft">
      <div class="ctag" id="g-ctag"></div>
      <div class="ccard">
        <div class="ccard-top">
          <div class="cdot" style="background:#e8a598"></div>
          <div class="cdot" style="background:#e8d498"></div>
          <div class="cdot" style="background:#a8c8a0"></div>
        </div>
        <div class="cbody" id="g-concept"></div>
      </div>
      <div>
        <div class="qbadge" id="g-qbadge"></div>
        <div class="qtext" id="g-q"></div>
      </div>
      <div class="choices" id="g-choices"></div>
      <div class="open-wrap" id="g-open" style="display:none;">
        <input class="open-input" id="g-input" placeholder="tape ta réponse..." onkeydown="if(event.key==='Enter')checkOpen()">
        <button class="open-btn" onclick="checkOpen()">→</button>
      </div>
      <div class="fb" id="g-fb"></div>
      <div class="gactions">
        <button class="btnhint" onclick="doHint()">? indice</button>
        <button class="btnext" id="g-next" onclick="nextQ()">suivant →</button>
      </div>
    </div>
    <div class="gright">
      <div class="glbl">progression</div>
      <div class="grid-outer"><div class="grid" id="grid"></div></div>
      <div class="mlog" id="g-mlog">en attente...</div>
    </div>
  </div>
</div>

<div class="win" id="win">
  <div class="win-robot">🤖</div>
  <div class="win-title" id="win-title"></div>
  <div class="win-msgs">
    <div class="win-msgs-lbl">take_home_messages[]</div>
    <ul id="win-list"></ul>
  </div>
  <div class="win-btns">
    <button class="btn-restart" onclick="restartChap()">↺ recommencer</button>
    <button class="btn-menu" onclick="goHome()">chapitres</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  MATHÉMATIQUES : nombres → algèbre → géométrie → stats
//  → dérivées → intégrales → exp/log → complexes
//  → matrices → équations différentielles
//  Du niveau zéro au niveau licence
// ════════════════════════════════════════════════════════════════


const CHAPTERS = [

// ── CHAPITRE 0 : pourquoi les maths ? ────────────────────────
{
  id:0, section:"introduction", num:0,
  name:"pourquoi les mathématiques ?",
  level:"zéro",
  takeaway:[
    "les maths sont le langage universel de la science",
    "un théorème est vrai pour toujours — la preuve est sa garantie",
    "les maths inventées 'pour rien' deviennent souvent utiles un jour",
    "l'abstraction permet de résoudre des milliers de problèmes d'un coup",
    "une erreur en maths est une occasion d'apprendre — pas une honte"
  ],
  questions:[
    {c:"notion · qu'est-ce qu'une preuve", type:"qcm",
     code:`<span class="cm">// preuve mathématique</span>
En maths, une affirmation est vraie seulement
si on peut la <span class="hl">démontrer</span> à partir d'axiomes.
<span class="ex">1 000 exemples qui vérifient une règle
≠ preuve que la règle est toujours vraie</span>
<span class="why">// ex : "tous les nombres premiers sont impairs"
// contre-exemple : 2 est premier ET pair → FAUX
// un seul contre-exemple suffit à réfuter</span>`,
     q:"On vérifie que 3² + 4² = 5², que 5² + 12² = 13², et 100 autres cas. C'est une preuve que a²+b²=c² a toujours des solutions ?",
     ch:["oui — 100 exemples c'est très convaincant","non — il faut une démonstration générale ou un contre-exemple","oui si les exemples sont variés","cela dépend du domaine"],
     ok:1, hint:"des exemples illustrent — ils ne prouvent pas",
     fb_ok:"// correct — 100 exemples ne prouvent pas une règle générale. Il faut une démonstration (ou trouver un contre-exemple).",
     fb_no:"// des exemples ne prouvent rien en général. Il faut une démonstration valide pour TOUT a, b, c.",
     mv:{dx:1,dy:0}},

    {c:"notion · abstraction", type:"qcm",
     code:`<span class="cm">// la puissance de l'abstraction</span>
<span class="ex">3 pommes + 2 pommes = 5 pommes
3 moutons + 2 moutons = 5 moutons
3 étoiles + 2 étoiles = 5 étoiles</span>
→ abstraction : <span class="hl">3 + 2 = 5</span>
Un seul théorème remplace une infinité de cas concrets.
<span class="why">// les matrices inventées au 19e siècle "pour rien"
// → base de la mécanique quantique, de l'IA, des jeux vidéo</span>`,
     q:"À quoi sert l'abstraction mathématique ?",
     ch:["à rendre les maths plus difficiles","à résoudre une infinité de cas concrets avec un seul résultat général","à éviter les exemples numériques","à réserver les maths aux experts"],
     ok:1, hint:"un théorème général s'applique à tous les cas particuliers",
     fb_ok:"// correct — l'abstraction permet de résoudre une infinité de cas avec un seul résultat.",
     fb_no:"// l'abstraction donne un résultat général qui s'applique à tous les cas particuliers simultanément.",
     mv:{dx:0,dy:-1}},
  ]
},

// ── CHAPITRE 1 : arithmétique et nombres ────────────────────
{
  id:1, section:"fondements", num:1,
  name:"nombres — naturels, entiers, rationnels, réels",
  level:"débutant",
  takeaway:[
    "ℕ ⊂ ℤ ⊂ ℚ ⊂ ℝ ⊂ ℂ — ensembles emboîtés",
    "√2 est irrationnel — ne s'écrit pas p/q",
    "la division par zéro est indéfinie",
    "PGCD et PPCM — utiles pour simplifier les fractions",
    "tout entier > 1 est soit premier, soit produit de premiers (unique)"
  ],
  questions:[
    {c:"notion · ensembles de nombres", type:"qcm",
     code:`<span class="cm">// emboîtement des ensembles</span>
<span class="hl">ℕ</span> = {0, 1, 2, 3, …}         naturels
<span class="hl">ℤ</span> = {…, −2, −1, 0, 1, 2, …}  entiers relatifs
<span class="hl">ℚ</span> = {p/q | p,q ∈ ℤ, q≠0}     rationnels
<span class="hl">ℝ</span> = rationnels + irrationnels  réels
<span class="hl">ℂ</span> = {a + bi}                   complexes
<span class="why">// ℕ ⊂ ℤ ⊂ ℚ ⊂ ℝ ⊂ ℂ</span>`,
     q:"√2 appartient à quel(s) ensemble(s) ?",
     ch:["ℕ et ℤ","ℚ — c'est rationnel","ℝ mais pas ℚ — c'est irrationnel","ℂ seulement"],
     ok:2, hint:"√2 ≈ 1.41421… — ne s'écrit pas comme fraction exacte",
     fb_ok:"// correct — √2 ∈ ℝ mais ∉ ℚ. Sa preuve d'irrationalité date des Grecs anciens.",
     fb_no:"// √2 est irrationnel : on peut prouver qu'il n'existe pas de fraction p/q = √2. Donc ℝ\\ℚ.",
     mv:{dx:1,dy:0}},

    {c:"notion · PGCD", type:"qcm",
     code:`<span class="cm">// PGCD — algorithme d'Euclide</span>
PGCD(a, b) = PGCD(b, a mod b) jusqu'à b=0
<span class="ex">PGCD(48, 18) :
48 = 2×18 + 12   → PGCD(18, 12)
18 = 1×12 + 6    → PGCD(12, 6)
12 = 2×6  + 0    → PGCD = 6</span>
<span class="why">// simplifier 48/18 = (48/6)/(18/6) = 8/3</span>`,
     q:"PGCD(36, 24) = ?",
     ch:["4","6","12","24"],
     ok:2, hint:"36 = 1×24+12 → PGCD(24,12) = 12",
     fb_ok:"// correct — 36=1×24+12, 24=2×12+0 → PGCD=12. On simplifie 36/24 = 3/2.",
     fb_no:"// 36=1×24+12 → PGCD(24,12). 24=2×12+0 → PGCD=12.",
     mv:{dx:0,dy:-1}},

    {c:"notion · nombres premiers", type:"qcm",
     code:`<span class="cm">// décomposition en facteurs premiers</span>
Tout entier > 1 se décompose de façon <span class="hl">unique</span>
en produit de nombres premiers.
<span class="ex">12 = 2² × 3
360 = 2³ × 3² × 5
100 = 2² × 5²</span>
<span class="why">// il existe une infinité de nombres premiers (Euclide)
// le plus grand premier connu : 2⁸²⁵⁸⁹⁹³³−1 (2024)</span>`,
     q:"Quelle est la décomposition de 84 en facteurs premiers ?",
     ch:["2 × 42","2² × 21","2² × 3 × 7","4 × 21"],
     ok:2, hint:"84 = 2×42 = 2×2×21 = 4×21 = 4×3×7 = 2²×3×7",
     fb_ok:"// correct — 84 = 2² × 3 × 7. Tous les facteurs sont premiers.",
     fb_no:"// 84 = 2×42 = 2×2×21 = 2×2×3×7 = 2²×3×7.",
     mv:{dx:1,dy:0}},
  ]
},

// ── CHAPITRE 2 : algèbre — équations ────────────────────────
{
  id:2, section:"algèbre", num:2,
  name:"équations et inéquations",
  level:"débutant",
  takeaway:[
    "résoudre une équation = trouver les valeurs qui la vérifient",
    "même opération des deux côtés — l'égalité est préservée",
    "équation du 2nd degré : ax²+bx+c=0 → Δ=b²−4ac",
    "inéquation : si on multiplie par un négatif, l'inégalité s'inverse",
    "système de 2 équations : substitution ou combinaison linéaire"
  ],
  questions:[
    {c:"notion · équation du 1er degré", type:"open",
     code:`<span class="cm">// résoudre ax + b = c</span>
Étapes : isoler x des deux côtés
<span class="ex">3x + 5 = 20
3x = 20 − 5 = 15
x = 15/3 = 5</span>
<span class="why">// vérification : 3×5 + 5 = 20 ✓
// toujours vérifier sa réponse !</span>`,
     q:"Résoudre : 2x − 7 = 11",
     keys:["9","x=9","x = 9"],
     hint:"2x = 11 + 7 = 18 → x = ?",
     fb_ok:"// correct — 2x = 18 → x = 9. Vérif : 2×9−7 = 18−7 = 11 ✓.",
     fb_no:"// 2x − 7 = 11 → 2x = 18 → x = 9.",
     mv:{dx:1,dy:0}},

    {c:"notion · équation du 2nd degré", type:"qcm",
     code:`<span class="cm">// ax² + bx + c = 0</span>
<span class="hl">Δ = b² − 4ac</span>
Δ > 0 → deux solutions : x = (−b ± √Δ) / 2a
Δ = 0 → une solution : x = −b / 2a
Δ < 0 → pas de solution réelle
<span class="ex">x²−5x+6=0 : Δ=25−24=1
x=(5±1)/2 → x=3 ou x=2</span>`,
     q:"x² − 4x + 4 = 0. Quel est le discriminant Δ ?",
     ch:["0","8","−8","16"],
     ok:0, hint:"Δ = b²−4ac = (−4)²−4×1×4 = 16−16",
     fb_ok:"// correct — Δ=0 → une seule solution : x = 4/2 = 2 (racine double).",

<span class="ex">population doublant tous les 30 ans :
k = ln(2)/30 ≈ 0.023/an</span>`,
     q:"Une bactérie se divise toutes les 20 min. Combien après 1h (en partant de 1) ?",
     ch:["4","6","8","16"],
     ok:2, hint:"1h = 3 divisions × 2 à chaque fois",
     fb_ok:"// correct — 3 divisions : 1 → 2 → 4 → 8. Ou N = 1·2^(60/20) = 2³ = 8.",
     fb_no:"// 60 min / 20 min = 3 divisions. N = 2³ = 8 bactéries.",
     mv:{dx:0,dy:-1}},
  ]
},

// ── CHAPITRE 9 : nombres complexes ─────────────────────────
{
  id:9, section:"algèbre avancée", num:9,
  name:"nombres complexes",
  level:"avancé",
  takeaway:[
    "i² = −1 — unité imaginaire",
    "z = a + bi — forme algébrique · |z| = √(a²+b²) — module",
    "forme trigonométrique : z = r·(cos θ + i·sin θ) = r·e^(iθ)",
    "conjugué : z̄ = a − bi · |z|² = z·z̄",
    "formule d'Euler : e^(iπ) + 1 = 0 — la plus belle équation des maths"
  ],
  questions:[
    {c:"notion · opérations complexes", type:"qcm",
     code:`<span class="cm">// calcul dans ℂ</span>
z₁ = 3 + 2i · z₂ = 1 − i
z₁ + z₂ = (3+1) + (2−1)i = <span class="hl">4 + i</span>
z₁ · z₂ = 3·1 + 3·(−i) + 2i·1 + 2i·(−i)
       = 3 − 3i + 2i − 2i²
       = 3 − i + 2 = <span class="hl">5 − i</span>  (car i²=−1)`,
     q:"(2 + 3i) × (1 + i) = ?",
     ch:["2 + 3i²","−1 + 5i","2 + 5i + 3i²","5 + 5i"],
     ok:1, hint:"= 2+2i+3i+3i² = 2+5i+3×(−1) = −1+5i",
     fb_ok:"// correct — 2·1+2·i+3i·1+3i·i = 2+2i+3i+3i² = 2+5i−3 = −1+5i.",
     fb_no:"// 2+2i+3i+3i² = 2+5i+3×(−1) = −1+5i.",
     mv:{dx:1,dy:0}},

    {c:"notion · module et argument", type:"qcm",
     code:`<span class="cm">// représentation polaire</span>
<span class="hl">|z| = √(a² + b²)</span>   module
<span class="hl">arg(z) = θ</span>         argument (angle avec axe réel)
<span class="hl">z = |z|·e^(iθ)</span>      forme exponentielle
<span class="ex">z = 1 + i :
|z| = √(1+1) = √2
arg(z) = arctan(1/1) = π/4</span>`,
     q:"|3 + 4i| = ?",
     ch:["7","5","√7","25"],
     ok:1, hint:"|z| = √(3²+4²) = √(9+16)",
     fb_ok:"// correct — |3+4i| = √25 = 5. Triplet 3-4-5 de Pythagore !",
     fb_no:"// |z| = √(a²+b²) = √(9+16) = √25 = 5.",
     mv:{dx:0,dy:-1}},

    {c:"application · formule d'Euler", type:"qcm",
     code:`<span class="cm">// formule d'Euler</span>
<span class="hl">e^(iθ) = cos(θ) + i·sin(θ)</span>
Cas particulier θ = π :
<span class="hl">e^(iπ) = cos(π) + i·sin(π) = −1 + 0 = −1</span>
→ <span class="hl">e^(iπ) + 1 = 0</span>
<span class="why">// relie e, i, π, 1 et 0 — les 5 constantes les plus importantes
// élue "plus belle formule des mathématiques" par les mathématiciens</span>`,
     q:"e^(iπ/2) = ?",
     ch:["−1","1","i","−i"],
     ok:2, hint:"cos(π/2) + i·sin(π/2) = 0 + i·1",
     fb_ok:"// correct — e^(iπ/2) = cos(π/2)+i·sin(π/2) = 0+i = i.",
     fb_no:"// e^(iθ)=cos(θ)+i·sin(θ). Pour θ=π/2 : cos(π/2)=0, sin(π/2)=1 → i.",
     mv:{dx:1,dy:0}},
  ]
},

// ── CHAPITRE 10 : algèbre linéaire ─────────────────────────
{
  id:10, section:"algèbre avancée", num:10,
  name:"algèbre linéaire — vecteurs et matrices",
  level:"avancé",
  takeaway:[
    "vecteur = direction + sens + norme — opérations : addition, produit scalaire",
    "produit scalaire u·v = |u||v|cos(θ) = 0 si perpendiculaires",
    "matrice = tableau de nombres — multiplication non commutative",
    "déterminant : det(A) ≠ 0 ↔ A inversible ↔ système a une solution unique",
    "valeurs propres λ : Av = λv — base de l'ACP, du quantum, des graphes"
  ],
  questions:[
    {c:"notion · produit scalaire", type:"qcm",
     code:`<span class="cm">// produit scalaire dans ℝ²</span>
<span class="hl">u·v = u₁v₁ + u₂v₂</span>
aussi = <span class="hl">|u|·|v|·cos(θ)</span>
si u·v = 0 → vecteurs <span class="hl">perpendiculaires</span>
<span class="ex">u=(3,4), v=(4,−3) :
u·v = 3×4 + 4×(−3) = 12−12 = 0 → ⊥ !</span>`,
     q:"u = (1, 2) et v = (−2, 1). Ces vecteurs sont-ils perpendiculaires ?",
     ch:["non — u·v = −4+2 = −2","oui — u·v = −2+2 = 0","non — ils sont colinéaires","oui — même norme"],
     ok:1, hint:"u·v = 1×(−2) + 2×1 = −2+2",
     fb_ok:"// correct — u·v = −2+2 = 0 → perpendiculaires. La norme ne suffit pas !",
     fb_no:"// u·v = 1×(−2)+2×1 = 0 → perpendiculaires.",
     mv:{dx:1,dy:0}},

    {c:"notion · multiplication matricielle", type:"qcm",
     code:`<span class="cm">// produit de matrices</span>
A(m×n) · B(n×p) = C(m×p)
<span class="ex">A = [[1,2],[3,4]]  B = [[5],[6]]
C = [[1×5+2×6],[3×5+4×6]]
  = [[17],[39]]</span>
<span class="why">// AB ≠ BA en général (non commutatif !)
// n doit coïncider : colonnes de A = lignes de B</span>`,
     q:"A est (3×4) et B est (4×2). AB est de taille :",
     ch:["(4×4)","(3×2)","(2×3)","impossible"],
     ok:1, hint:"A(m×n) × B(n×p) → C(m×p). m=3, n=4, p=2",
     fb_ok:"// correct — (3×4)×(4×2) = (3×2). Le 4 intérieur doit coïncider.",
     fb_no:"// (m×n)·(n×p) = (m×p). Ici m=3, n=4 coïncident, p=2 → (3×2).",
     mv:{dx:0,dy:-1}},

    {c:"application · déterminant et inversibilité", type:"qcm",
     code:`<span class="cm">// déterminant 2×2</span>
A = [[a,b],[c,d]]
<span class="hl">det(A) = ad − bc</span>
Si det(A) ≠ 0 → A est inversible → système Ax=b a une solution unique
Si det(A) = 0 → A non inversible → système sans solution ou infinité
<span class="ex">A=[[2,1],[4,2]] : det = 2×2−1×4 = 0 → non inversible</span>`,
     q:"A = [[3, 1], [5, 2]]. det(A) = ?",
     ch:["1","11","−1","6"],
     ok:0, hint:"det = 3×2 − 1×5 = 6 − 5",
     fb_ok:"// correct — det = 3×2−1×5 = 6−5 = 1 ≠ 0 → A inversible.",
     fb_no:"// det([[a,b],[c,d]]) = ad−bc = 3×2−1×5 = 1.",
     mv:{dx:1,dy:0}},
  ]
},

// ── CHAPITRE 11 : équations différentielles ─────────────────
{
  id:11, section:"analyse avancée", num:11,
  name:"équations différentielles",
  level:"avancé",
  takeaway:[
    "ED du 1er ordre : y' + a(x)y = b(x) — séparation des variables",
    "ED linéaire homogène : y' = ky → solution y = C·e^(kx)",
    "ED du 2nd ordre : y'' + py' + qy = 0 → équation caractéristique r²+pr+q=0",
    "Δ>0 → deux solutions réelles · Δ=0 → racine double · Δ<0 → oscillations",
    "les ED modélisent : population, circuit RC, oscillateur, chaleur, ondes"
  ],
  questions:[
    {c:"notion · ED linéaire du 1er ordre", type:"qcm",
     code:`<span class="cm">// y' = k·y → solution générale</span>
Séparation : dy/y = k·dx
Intégration : ln|y| = kx + C
→ <span class="hl">y(x) = A·e^(kx)</span>
<span class="ex">croissance bactérienne : dN/dt = r·N
→ N(t) = N₀·e^(rt)
radioactivité  : dN/dt = −λ·N
→ N(t) = N₀·e^(−λt)</span>`,
     q:"y' = 3y et y(0) = 5. Quelle est y(x) ?",
     ch:["y = 3e^(5x)","y = 5e^(3x)","y = 5x³","y = 15e^x"],
     ok:1, hint:"y = A·e^(kx), puis y(0) = A = 5 et k = 3",
     fb_ok:"// correct — y = A·e^(3x), y(0) = A = 5 → y = 5e^(3x).",
     fb_no:"// y' = ky → y = Ae^(kx). k=3, y(0)=A=5 → y = 5e^(3x).",
     mv:{dx:1,dy:0}},

    {c:"notion · équation caractéristique", type:"qcm",
     code:`<span class="cm">// ED 2nd ordre — y'' + py' + qy = 0</span>
Équation caractéristique : <span class="hl">r² + pr + q = 0</span>
Δ > 0 : deux racines r₁,r₂ → y = Ae^(r₁x) + Be^(r₂x)
Δ = 0 : racine double r   → y = (A+Bx)e^(rx)
Δ < 0 : racines complexes → y = e^(αx)(A·cos(βx)+B·sin(βx))
<span class="why">// Δ<0 → oscillations ! (pendule, circuit LC, corde vibrante)</span>`,
     q:"y'' − 5y' + 6y = 0. L'équation caractéristique est :",
     ch:["r + 5 = 0","r² − 5r + 6 = 0","r² + 5r − 6 = 0","5r² − 6 = 0"],
     ok:1, hint:"remplacer y'' par r², y' par r, y par 1",
     fb_ok:"// correct — r²−5r+6=0 → (r−2)(r−3)=0 → r=2 ou r=3 → y=Ae^(2x)+Be^(3x).",
     fb_no:"// substitution : y→1, y'→r, y''→r² → r²−5r+6=0.",
     mv:{dx:0,dy:-1}},

    {c:"application · circuit RC", type:"qcm",
     code:`<span class="cm">// circuit RC — modèle ED</span>
Charge d'un condensateur :
<span class="hl">RC · dU/dt + U = E</span>
Solution : <span class="hl">U(t) = E·(1 − e^(−t/RC))</span>
τ = RC = constante de temps
<span class="ex">R=1kΩ, C=1mF → τ = 1s
après t=τ : U = E(1−e⁻¹) ≈ 0.63·E</span>`,
     q:"Après un temps t = 5τ, la tension U vaut environ :",
     ch:["0.63·E","0.99·E","0.5·E","E"],
     ok:1, hint:"U = E(1 − e^(−5)) ≈ E(1 − 0.0067) ≈ 0.993·E",
     fb_ok:"// correct — e^(−5) ≈ 0.007 → U ≈ 0.993·E ≈ 99.3%. On considère 5τ = chargé.",
     fb_no:"// t=5τ : e^(−5) ≈ 0.007 → U = E(1−0.007) ≈ 0.993·E ≈ 99%.",
     mv:{dx:1,dy:0}},
  ]
},

];

const SECTIONS = {};
CHAPTERS.forEach(ch => {
  if(!SECTIONS[ch.section]) SECTIONS[ch.section] = [];
  SECTIONS[ch.section].push(ch);
});

// ═══════════════════════════════════════
//  ÉTAT
// ═══════════════════════════════════════
let curChap=null, curQ=0, score=0, answered=false;
let rX=0, rY=5;
const GOAL={x:5,y:0};
let traces=new Set();

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome(){
  document.getElementById('win').classList.remove('show');
  show('s-home');
}

function buildHome(){
  const list=document.getElementById('chap-list');
  list.innerHTML='';
  Object.entries(SECTIONS).forEach(([sec, chaps])=>{
    const sec_div=document.createElement('div');
    sec_div.className='chap-section';
    const lbl=document.createElement('div');
    lbl.className='chap-section-lbl';
    lbl.textContent=sec;
    sec_div.appendChild(lbl);
    chaps.forEach(ch=>{
      const row=document.createElement('div');
      row.className='chap-row';
      row.innerHTML=`
        <span class="chap-num">${ch.num}.</span>
        <span class="chap-name">${ch.name}</span>
        <span class="chap-level">${ch.level}</span>
        <span class="chap-count">${ch.questions.length} qs</span>`;
      row.onclick=()=>startChap(ch);
      sec_div.appendChild(row);
    });
    list.appendChild(sec_div);
  });
}

function startChap(ch){
  curChap=ch; curQ=0; score=0; answered=false;
  rX=0; rY=5; traces=new Set();
  document.getElementById('win').classList.remove('show');
  buildGrid(); loadQ(); show('s-game');
}

function loadQ(){
  answered=false;
  const q=curChap.questions[curQ];
  document.getElementById('g-title').textContent=curChap.name;
  document.getElementById('g-pts').textContent=score+' pts';
  document.getElementById('g-ctag').textContent=q.c;
  document.getElementById('g-concept').innerHTML=q.code;
  document.getElementById('g-q').textContent=q.q;
  document.getElementById('g-fb').className='fb';
  document.getElementById('g-next').className='btnext';

  const badge=document.getElementById('g-qbadge');
  badge.textContent=q.type==='qcm'?'QCM':'question ouverte';
  badge.className='qbadge '+(q.type==='qcm'?'qcm':'open');

  const dr=document.getElementById('dots-row');
  dr.innerHTML='';
  curChap.questions.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i<curQ?' done':i===curQ?' cur':'');
    dr.appendChild(d);
  });

  const cc=document.getElementById('g-choices');
  const ow=document.getElementById('g-open');
  const inp=document.getElementById('g-input');
  cc.innerHTML='';

  if(q.type==='qcm'){
    ow.style.display='none';
    q.ch.forEach((t,i)=>{
      const b=document.createElement('button');
      b.className='choice'; b.textContent=t;
      b.onclick=()=>answerQcm(i);
      cc.appendChild(b);
    });
  } else {
    ow.style.display='flex';
    inp.value=''; inp.disabled=false;
    document.querySelector('.open-btn').disabled=false;
    setTimeout(()=>inp.focus(),100);
  }
}

function answerQcm(idx){
  if(answered) return;
  answered=true;
  const q=curChap.questions[curQ];
  const ok=idx===q.ok;
  document.querySelectorAll('.choice').forEach((b,i)=>{
    if(i===q.ok) b.classList.add('ok');
    else if(i===idx&&!ok) b.classList.add('no');
    else b.classList.add('dim');
    b.onclick=null;
  });
  showFb(ok,q);
}

function checkOpen(){
  if(answered) return;
  const q=curChap.questions[curQ];
  const val=document.getElementById('g-input').value.trim().toLowerCase();
  if(!val) return;
  const ok=q.keys.some(k=>val.includes(k.toLowerCase())||k.toLowerCase()===val);
  answered=true;
  document.getElementById('g-input').disabled=true;
  document.querySelector('.open-btn').disabled=true;
  showFb(ok,q);
}

function showFb(ok,q){
  const fb=document.getElementById('g-fb');
  fb.className='fb show '+(ok?'ok':'no');
  fb.textContent=ok?q.fb_ok:q.fb_no;
  if(ok){score+=10;document.getElementById('g-pts').textContent=score+' pts';sparks();}
  moveRobot(q.mv.dx,q.mv.dy);
  document.getElementById('g-next').className='btnext show';
}

function doHint(){
  const fb=document.getElementById('g-fb');
  fb.className='fb show hint';
  fb.textContent='? '+curChap.questions[curQ].hint;
}

function nextQ(){
  curQ++;
  if(curQ>=curChap.questions.length){showWin();return;}
  loadQ();
}

function showWin(){
  document.getElementById('win-title').textContent=`// ${curChap.name} · maîtrisé`;
  const ul=document.getElementById('win-list');
  ul.innerHTML='';
  curChap.takeaway.forEach(t=>{
    const li=document.createElement('li');li.textContent=t;ul.appendChild(li);
  });
  document.getElementById('win').classList.add('show');
}

function restartChap(){
  document.getElementById('win').classList.remove('show');
  startChap(curChap);
}

function buildGrid(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  for(let y=0;y<6;y++) for(let x=0;x<6;x++){
    const d=document.createElement('div');
    d.id=`gc${x}${y}`;d.className='gcell';
    if(x===GOAL.x&&y===GOAL.y) d.textContent='🏁';
    g.appendChild(d);
  }
  renderGrid();
}

function renderGrid(){
  for(let y=0;y<6;y++) for(let x=0;x<6;x++){
    const d=document.getElementById(`gc${x}${y}`);
    if(!d) continue;
    d.className='gcell';d.textContent='';d.innerHTML='';
    if(x===GOAL.x&&y===GOAL.y){d.classList.add('goal');d.textContent='🏁';continue;}
    if(traces.has(`${x},${y}`)) d.classList.add('trace');
    if(x===rX&&y===rY){
      d.classList.add('robot');
      d.innerHTML=`<svg width="26" height="26" viewBox="0 0 32 32" fill="none">
        <rect x="8" y="12" width="16" height="14" rx="4" fill="#1a1814"/>
        <rect x="11" y="15" width="4" height="4" rx="1.5" fill="#faf8f4"/>
        <rect x="17" y="15" width="4" height="4" rx="1.5" fill="#faf8f4"/>
        <rect x="13" y="21" width="6" height="2" rx="1" fill="#7a9e87"/>
        <rect x="14" y="8" width="4" height="5" rx="2" fill="#1a1814"/>
        <circle cx="16" cy="7" r="2" fill="#c8a870"/>
        <rect x="5" y="16" width="3" height="6" rx="1.5" fill="#1a1814"/>
        <rect x="24" y="16" width="3" height="6" rx="1.5" fill="#1a1814"/>
        <rect x="10" y="26" width="4" height="3" rx="1.5" fill="#1a1814"/>
        <rect x="18" y="26" width="4" height="3" rx="1.5" fill="#1a1814"/>
      </svg>`;
    }
  }
}

function moveRobot(dx,dy){
  traces.add(`${rX},${rY}`);
  rX=Math.max(0,Math.min(5,rX+dx));
  rY=Math.max(0,Math.min(5,rY+dy));
  renderGrid();
  const dir=dx>0?'droite':dx<0?'gauche':dy<0?'haut':'bas';
  document.getElementById('g-mlog').textContent=`${curQ+1}/${curChap.questions.length} → ${dir}`;
}

function sparks(){
  const cell=document.getElementById(`gc${rX}${rY}`);
  if(!cell) return;
  const r=cell.getBoundingClientRect();
  ['#c8a870','#e8a598','#7a9e87','#a89ec8'].forEach((c,i)=>{
    const p=document.createElement('div');p.className='pt';
    const s=3+Math.random()*5;
    p.style.cssText=`width:${s}px;height:${s}px;background:${c};left:${r.left+r.width/2+(-15+Math.random()*30)}px;top:${r.top+r.height/2}px;animation-delay:${i*0.05}s`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),1000);
  });
}

buildHome();
</script>
</body>
</html>
