<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denis · python robot</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#faf8f4;--bg2:#f0ebe2;--bg3:#e8dfd0;
  --ink:#1a1814;--ink2:#6b6760;--ink3:#b5b2ac;
  --sage:#7a9e87;--blush:#e8a598;--amber:#c8a870;--lav:#a89ec8;
  --sky:#8fb4c8;--line:rgba(26,24,20,0.08);
}
html,body{min-height:100%;background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:14px;}

/* ── HEADER ── */
header{display:flex;align-items:center;gap:16px;padding:0.7rem 1.25rem;border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:0;z-index:50;}
.logo{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:13px;color:var(--ink);font-weight:400;}
.logo-icon{background:var(--ink);color:var(--bg);width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;letter-spacing:0.05em;}
.progress-global{margin-left:auto;display:flex;align-items:center;gap:10px;}
#progress-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);}
.progress-bar-wrap{width:120px;height:3px;background:var(--bg3);border-radius:2px;}
.progress-bar-fill{height:3px;background:var(--sage);border-radius:2px;transition:width 0.4s;}

/* ── APP LAYOUT ── */
.app{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 45px);}
@media(max-width:700px){.app{grid-template-columns:1fr;}}

/* ── SIDEBAR ── */
.sidebar{background:white;border-right:1px solid var(--line);padding:1rem 0;overflow-y:auto;}
.sidebar-section{margin-bottom:0.5rem;}
.sidebar-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);padding:4px 14px;margin-bottom:2px;}
.sidebar-section .ex-card{padding:7px 14px;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;color:var(--ink2);display:flex;align-items:center;gap:8px;transition:all 0.12s;border-left:2px solid transparent;}
.sidebar-section .ex-card:hover{background:var(--bg2);color:var(--ink);}
.sidebar-section .ex-card.active{background:var(--bg2);color:var(--ink);border-left-color:var(--sage);}
.sidebar-section .ex-card.done{color:var(--sage);}

/* ── MAIN CONTENT ── */
.main{padding:1.5rem;display:flex;flex-direction:column;gap:1.25rem;overflow-y:auto;max-width:720px;}

/* ── NOTION / CONCEPT ── */
.concept-box{background:white;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.notion-header{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--line);background:var(--bg2);}
.notion-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);}
.notion-title{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink);}
.notion-desc{padding:0.9rem 1.1rem;font-family:'DM Mono',monospace;font-size:12px;line-height:1.9;color:var(--ink2);white-space:pre-wrap;}

/* ── EXERCISE ── */
.ex-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.ex-title{font-family:'DM Mono',monospace;font-size:13px;color:var(--ink);}
.ex-badge{font-family:'DM Mono',monospace;font-size:9px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--ink3);}
.ex-badge.easy{border-color:rgba(122,158,135,0.4);color:#3d6b4f;background:rgba(122,158,135,0.08);}
.ex-badge.medium{border-color:rgba(200,168,112,0.4);color:#7a5e1e;background:rgba(200,168,112,0.08);}
.ex-badge.hard{border-color:rgba(168,158,200,0.4);color:#4a4470;background:rgba(168,158,200,0.08);}
.ex-desc{font-size:13px;color:var(--ink2);line-height:1.6;}
.ex-desc code{font-family:'DM Mono',monospace;font-size:11.5px;background:var(--bg2);padding:1px 5px;border-radius:3px;color:var(--ink);}

/* ── EDITOR ── */
.editor-wrap{background:white;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.editor-toolbar{display:flex;align-items:center;gap:6px;padding:6px 11px;border-bottom:1px solid var(--line);background:var(--bg2);}
.editor-dots{display:flex;gap:4px;}
.editor-dots::before,.editor-dots::after{content:'';display:block;width:7px;height:7px;border-radius:50%;}
.editor-dots{gap:4px;}
.editor-dots span:nth-child(1){background:var(--blush);}
.editor-dots span:nth-child(2){background:var(--amber);}
.editor-dots span:nth-child(3){background:var(--sage);}
.code-editor{width:100%;min-height:100px;padding:0.9rem 1.1rem;font-family:'DM Mono',monospace;font-size:12px;line-height:1.9;color:var(--ink);background:white;border:none;resize:vertical;outline:none;tab-size:4;}
.editor-actions{display:flex;gap:6px;padding:8px 10px;border-top:1px solid var(--line);}

/* ── OUTPUT ── */
.output-box{background:white;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.output-header{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.08em;text-transform:uppercase;padding:6px 11px;border-bottom:1px solid var(--line);background:var(--bg2);color:var(--ink3);}
.output-header.info{color:var(--sky);}
.output-content{padding:0.75rem 1.1rem;font-family:'DM Mono',monospace;font-size:12px;color:var(--ink2);white-space:pre-wrap;line-height:1.7;min-height:40px;}

/* ── SUCCESS ── */
.success-banner{background:rgba(122,158,135,0.08);border:1px solid rgba(122,158,135,0.3);border-radius:8px;padding:0.75rem 1rem;display:none;align-items:center;gap:8px;}
.success-banner.visible{display:flex;}
.success-icon{font-size:16px;}
.success-text{font-family:'DM Mono',monospace;font-size:12px;color:#3d6b4f;line-height:1.5;}

/* ── HINT ── */
.hint-box{background:rgba(200,168,112,0.07);border:1px solid rgba(200,168,112,0.3);border-radius:8px;padding:0.75rem 1rem;display:none;}
.hint-box.visible{display:block;}
.hint-box p{font-family:'DM Mono',monospace;font-size:12px;color:#7a5e1e;line-height:1.6;}
.hint-box strong{color:var(--ink);}
.hint-box code{background:rgba(200,168,112,0.15);padding:1px 5px;border-radius:3px;font-family:'DM Mono',monospace;font-size:11px;}

/* ── STEPS ── */
.steps-nav{display:flex;gap:4px;align-items:center;}
.step-dot{width:6px;height:6px;border-radius:50%;background:var(--bg3);border:1px solid var(--line);}
.step-dot.done{background:var(--sage);border-color:var(--sage);}
.step-dot.cur{background:var(--ink);border-color:var(--ink);}

/* ── COMPLETION ── */
.completion-card{background:white;border:1px solid var(--line);border-radius:12px;padding:2rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1rem;}
.big-icon{font-size:36px;}
.ch-icon{font-size:20px;}

/* ── BUTTONS ── */
.btn-run,.btn-reset,.btn-hint,.btn-next{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.04em;padding:7px 14px;border-radius:999px;cursor:pointer;transition:all 0.12s;}
.btn-run{background:var(--ink);color:var(--bg);border:none;}
.btn-run:hover{opacity:0.75;}
.btn-reset{background:none;color:var(--ink3);border:1px solid var(--line);}
.btn-reset:hover{border-color:var(--ink3);color:var(--ink2);}
.btn-hint{background:none;color:var(--amber);border:1px solid rgba(200,168,112,0.3);}
.btn-hint:hover{border-color:var(--amber);}
.btn-next{background:none;color:var(--sky);border:1px solid rgba(143,180,200,0.3);}
.btn-next:hover{border-color:var(--sky);}
</style>
</head>
<body>

<header>
  <a href="index.html" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);text-decoration:none;letter-spacing:0.06em;flex-shrink:0;">← denis</a>
  <div class="logo">
    <div class="logo-icon">py</div>
    PyLearn
  </div>
  <div class="progress-global">
    <span id="progress-label">0 / 0 exercices</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="global-bar" style="width:0%"></div>
    </div>
  </div>
</header>

<div class="app">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main-content"></main>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   CURRICULUM
═══════════════════════════════════════════════════════ */
const curriculum = [
  {
    id: "variables",
    title: "Variables",
    icon: "x",
    tag: "Les bases",
    description: "En Python, une variable est une étiquette collée sur une valeur. Pas besoin de déclarer le type — Python le devine tout seul.",
    concept: `# Créer une variable, c'est simple :
prenom = "Alice"
age = 25
taille = 1.68

# On peut afficher sa valeur :
print(prenom)   # → Alice
print(age)      # → 25`,
    exercises: [
      {
        level: "easy",
        title: "Ta première variable",
        desc: "Crée une variable <code>nom</code> qui contient ton prénom, puis affiche-la avec <code>print()</code>.",
        starter: `nom = `,
        test: (output) => output.trim().length > 0,
        hint: "Assigne une chaîne de caractères entre guillemets : <strong>nom = \"Alice\"</strong>, puis écris <strong>print(nom)</strong>",
        successMsg: "Parfait ! Tu viens de créer ta première variable. Python mémorise la valeur jusqu'à la fin du programme."
      },
      {
        level: "easy",
        title: "Plusieurs variables",
        desc: "Crée trois variables : <code>prenom</code>, <code>age</code> (un nombre entier), et <code>ville</code>. Affiche-les sur trois lignes.",
        starter: `prenom = "Alice"\nage = `,
        test: (output) => output.trim().split("\n").length >= 3,
        hint: "Tu as besoin de trois <strong>print()</strong>. Les entiers s'écrivent sans guillemets : <strong>age = 25</strong>",
        successMsg: "Excellent ! Python distingue automatiquement les chaînes (str), les entiers (int) et les décimaux (float)."
      },
      {
        level: "medium",
        title: "Composition de message",
        desc: "Crée <code>prenom</code> et <code>age</code>, puis affiche une phrase complète avec <code>f\"Bonjour, je m'appelle {prenom} et j'ai {age} ans.\"</code>",
        starter: `prenom = "Alice"\nage = 25\nprint(`,
        test: (output) => output.includes("Bonjour") && output.includes("appelle") && output.includes("ans"),
        hint: "Utilise un <strong>f-string</strong> : <strong>print(f\"Je m'appelle {prenom}\")</strong> — les accolades injectent la variable.",
        successMsg: "Les f-strings sont très utilisés en Python moderne. La notation f\"...{var}...\" s'appelle l'interpolation de chaîne."
      }
    ]
  },
  {
    id: "conditions",
    title: "Conditions",
    icon: "?",
    tag: "Contrôle",
    description: "Avec <code>if</code>, <code>elif</code> et <code>else</code>, ton programme peut prendre des décisions selon les valeurs des variables.",
    concept: `# Structure d'une condition :
age = 20

if age >= 18:
    print("Majeur")
elif age >= 13:
    print("Adolescent")
else:
    print("Enfant")

# Opérateurs : ==  !=  <  >  <=  >=
# Logique    : and  or  not`,
    exercises: [
      {
        level: "easy",
        title: "Pair ou impair ?",
        desc: "La variable <code>n</code> vaut 7. Affiche \"pair\" si <code>n % 2 == 0</code>, sinon affiche \"impair\". Le <code>%</code> donne le reste de la division.",
        starter: `n = 7\nif `,
        test: (output) => output.trim().toLowerCase().includes("impair"),
        hint: "Structure : <strong>if n % 2 == 0:</strong><br>&nbsp;&nbsp;&nbsp;&nbsp;<strong>print(\"pair\")</strong><br><strong>else:</strong><br>&nbsp;&nbsp;&nbsp;&nbsp;<strong>print(\"impair\")</strong>",
        successMsg: "7 % 2 = 1, donc impair. L'opérateur % (modulo) est très pratique pour tester la divisibilité."
      },
      {
        level: "easy",
        title: "Note scolaire",
        desc: "La variable <code>note</code> vaut 14. Affiche \"Excellent\" (≥16), \"Bien\" (≥12), \"Passable\" (≥10) ou \"Insuffisant\" selon la valeur.",
        starter: `note = 14\nif note >= 16:\n    print("Excellent")\n`,
        test: (output) => output.trim().toLowerCase().includes("bien"),
        hint: "Utilise <strong>elif note >= 12:</strong> pour le deuxième cas, etc. Chaque bloc s'exécute si la condition précédente était fausse.",
        successMsg: "Les elif permettent d'enchaîner autant de conditions que nécessaire. Python les évalue dans l'ordre et s'arrête au premier vrai."
      },
      {
        level: "medium",
        title: "Accès VIP",
        desc: "Crée <code>age = 22</code> et <code>vip = True</code>. Affiche \"Entrée gratuite\" si vip ET age >= 18, \"Entrée payante\" si age >= 18 seulement, sinon \"Interdit\".",
        starter: `age = 22\nvip = True\nif `,
        test: (output) => output.trim().toLowerCase().includes("gratuite"),
        hint: "Combine deux conditions : <strong>if vip and age >= 18:</strong> — l'opérateur <strong>and</strong> exige que les deux soient vraies.",
        successMsg: "Les opérateurs logiques and / or / not combinent des conditions booléennes. C'est la base de toute logique de programme."
      }
    ]
  },
  {
    id: "boucles",
    title: "Boucles",
    icon: "↺",
    tag: "Répétition",
    description: "Les boucles permettent de répéter des instructions. <code>for</code> parcourt une séquence, <code>while</code> répète tant qu'une condition est vraie.",
    concept: `# Boucle for — parcours d'une plage :
for i in range(5):       # i = 0,1,2,3,4
    print(i)

# range(début, fin, pas) :
for i in range(1, 10, 2):  # 1,3,5,7,9
    print(i)

# Boucle while :
compteur = 0
while compteur < 3:
    print(compteur)
    compteur += 1`,
    exercises: [
      {
        level: "easy",
        title: "Compter jusqu'à 5",
        desc: "Affiche les nombres de 1 à 5 inclus, un par ligne, avec une boucle <code>for</code> et <code>range()</code>.",
        starter: `for i in range(`,
        test: (output) => {
          const lines = output.trim().split("\n").map(l => l.trim()).filter(l => l);
          return lines.length === 5 && lines[0] === "1" && lines[4] === "5";
        },
        hint: "range(1, 6) génère 1, 2, 3, 4, 5. Le deuxième nombre est <strong>exclu</strong>. Écris ensuite <strong>print(i)</strong> dans le bloc.",
        successMsg: "range(1, 6) → [1, 2, 3, 4, 5]. Retiens : la borne droite est toujours exclue en Python."
      },
      {
        level: "easy",
        title: "Table de multiplication",
        desc: "Affiche la table de multiplication de 3 : \"3 x 1 = 3\", \"3 x 2 = 6\", ..., \"3 x 10 = 30\".",
        starter: `for i in range(1, 11):\n    print(f"3 x {i} = `,
        test: (output) => {
          const lines = output.trim().split("\n").filter(l => l.trim());
          return lines.length === 10 && output.includes("3 x 10 = 30");
        },
        hint: "Dans le print, tu dois calculer le résultat : <strong>f\"3 x {i} = {3 * i}\"</strong>",
        successMsg: "Les f-strings peuvent contenir n'importe quelle expression Python entre accolades, pas seulement des variables !"
      },
      {
        level: "medium",
        title: "Somme des pairs",
        desc: "Calcule la somme de tous les nombres pairs de 2 à 20 (inclus). Affiche le résultat final avec <code>print(\"Somme =\", total)</code>.",
        starter: `total = 0\nfor i in range(`,
        test: (output) => output.includes("110"),
        hint: "Utilise <strong>range(2, 21, 2)</strong> pour sauter de 2 en 2, et accumule : <strong>total += i</strong>",
        successMsg: "2+4+6+...+20 = 110. La variable accumulatrice (total = 0, puis total += i) est un schéma classique en programmation."
      }
    ]
  },
  {
    id: "listes",
    title: "Listes",
    icon: "[]",
    tag: "Données",
    description: "Une liste stocke plusieurs valeurs dans un ordre précis. Elle est modifiable, indexée à partir de 0, et peut contenir n'importe quel type.",
    concept: `# Créer et accéder :
fruits = ["pomme", "banane", "cerise"]
print(fruits[0])     # pomme (premier)
print(fruits[-1])    # cerise (dernier)

# Modifier :
fruits.append("mangue")   # ajouter
fruits[1] = "kiwi"        # modifier
fruits.remove("pomme")    # supprimer

# Parcourir :
for f in fruits:
    print(f)`,
    exercises: [
      {
        level: "easy",
        title: "Accéder à un élément",
        desc: "La liste <code>couleurs</code> contient \"rouge\", \"vert\", \"bleu\". Affiche le premier et le dernier élément (avec les index).",
        starter: `couleurs = ["rouge", "vert", "bleu"]\nprint(couleurs[`,
        test: (output) => output.includes("rouge") && output.includes("bleu"),
        hint: "Premier élément : <strong>couleurs[0]</strong>, dernier : <strong>couleurs[-1]</strong> (index négatif = depuis la fin)",
        successMsg: "L'indexation négative (-1, -2...) est spécifique à Python et très pratique pour accéder à la fin d'une liste."
      },
      {
        level: "easy",
        title: "Construire une liste",
        desc: "Crée une liste vide <code>nombres</code>, puis ajoute les nombres 10, 20, 30 avec <code>.append()</code>. Affiche la liste finale.",
        starter: `nombres = []\nnombres.append(`,
        test: (output) => output.includes("10") && output.includes("20") && output.includes("30"),
        hint: "Appelle <strong>.append()</strong> trois fois : <strong>nombres.append(10)</strong>, etc. Puis <strong>print(nombres)</strong>.",
        successMsg: ".append() ajoute toujours en fin de liste. Pour insérer ailleurs : .insert(index, valeur)."
      },
      {
        level: "medium",
        title: "Maximum d'une liste",
        desc: "Crée <code>notes = [12, 17, 9, 14, 11]</code>. Sans utiliser <code>max()</code>, trouve et affiche la note la plus haute avec une boucle.",
        starter: `notes = [12, 17, 9, 14, 11]\nmaxi = notes[0]\nfor note in `,
        test: (output) => output.trim().includes("17"),
        hint: "Parcours la liste. À chaque étape : <strong>if note > maxi: maxi = note</strong>. Affiche <strong>maxi</strong> après la boucle.",
        successMsg: "17 ! Ce schéma (initialiser avec le premier, parcourir, comparer) est fondamental. C'est ainsi que max() fonctionne en interne."
      }
    ]
  },
  {
    id: "fonctions",
    title: "Fonctions",
    icon: "ƒ",
    tag: "Structure",
    description: "Une fonction regroupe des instructions réutilisables sous un nom. Elle prend des paramètres en entrée et peut retourner une valeur.",
    concept: `# Définir et appeler :
def saluer(prenom):
    return f"Bonjour, {prenom} !"

message = saluer("Alice")
print(message)          # Bonjour, Alice !

# Plusieurs paramètres :
def addition(a, b):
    return a + b

print(addition(3, 4))   # 7`,
    exercises: [
      {
        level: "easy",
        title: "Première fonction",
        desc: "Définis une fonction <code>carre(n)</code> qui retourne n², puis affiche <code>carre(5)</code>.",
        starter: `def carre(n):\n    return `,
        test: (output) => output.trim().includes("25"),
        hint: "Dans la fonction : <strong>return n * n</strong> (ou n**2). Ensuite appelle-la : <strong>print(carre(5))</strong>",
        successMsg: "25 = 5². En Python, ** est l'opérateur puissance. Une fonction sans return renvoie None implicitement."
      },
      {
        level: "easy",
        title: "Valeur par défaut",
        desc: "Définis <code>saluer(prenom, politesse=\"Bonjour\")</code> qui affiche \"Bonjour, Alice !\" ou \"Salut, Bob !\" selon le paramètre. Teste les deux formes.",
        starter: `def saluer(prenom, politesse="Bonjour"):\n    print(`,
        test: (output) => {
          const lines = output.trim().split("\n").filter(l => l.trim());
          return lines.length >= 2;
        },
        hint: "Dans la fonction : <strong>print(f\"{politesse}, {prenom} !\")</strong>. Appelle <strong>saluer(\"Alice\")</strong> puis <strong>saluer(\"Bob\", \"Salut\")</strong>",
        successMsg: "Les paramètres avec valeur par défaut sont optionnels à l'appel. C'est très utile pour créer des fonctions flexibles."
      },
      {
        level: "medium",
        title: "Factorielle",
        desc: "Définis <code>factorielle(n)</code> qui calcule n! (ex: 5! = 5×4×3×2×1 = 120). Utilise une boucle. Affiche <code>factorielle(6)</code>.",
        starter: `def factorielle(n):\n    resultat = 1\n    for i in `,
        test: (output) => output.trim().includes("720"),
        hint: "range(1, n+1) va de 1 à n. Multiplie dans la boucle : <strong>resultat *= i</strong>. Retourne <strong>resultat</strong>.",
        successMsg: "6! = 720. On aurait aussi pu l'écrire récursivement : def fact(n): return 1 if n <= 1 else n * fact(n-1)"
      }
    ]
  }
];

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
let state = {
  currentChapter: 0,
  currentStep: 0,
  completed: {},   // {chapterId: {0: true, 1: true, ...}}
  hintShown: {}    // {key: true}
};

// Init completed tracking
curriculum.forEach(ch => { state.completed[ch.id] = {}; });

/* ═══════════════════════════════════════════════════════
   PYTHON INTERPRETER (simple subset)
═══════════════════════════════════════════════════════ */
function runPython(code) {
  let output = "";
  const printFn = (...args) => {
    output += args.map(a => {
      if (Array.isArray(a)) return "[" + a.map(x => typeof x === "string" ? `'${x}'` : String(x)).join(", ") + "]";
      return String(a);
    }).join(" ") + "\n";
  };

  // Transpile Python → JS (simple subset)
  let js = code;

  // Comments
  js = js.replace(/#[^\n]*/g, "");

  // f-strings  f"...{expr}..."
  js = js.replace(/f"((?:[^"\\]|\\.)*)"/g, (_, s) =>
    "`" + s.replace(/\{([^}]+)\}/g, (_, e) => "${" + e + "}") + "`");
  js = js.replace(/f'((?:[^'\\]|\\.)*)'/g, (_, s) =>
    "`" + s.replace(/\{([^}]+)\}/g, (_, e) => "${" + e + "}") + "`");

  // Strings (keep as is)
  js = js.replace(/"""([\s\S]*?)"""/g, (_, s) => "`" + s + "`");

  // print()
  js = js.replace(/\bprint\s*\(/g, "__print__(");

  // True/False/None
  js = js.replace(/\bTrue\b/g, "true").replace(/\bFalse\b/g, "false").replace(/\bNone\b/g, "null");

  // and/or/not
  js = js.replace(/\band\b/g, "&&").replace(/\bor\b/g, "||").replace(/\bnot\b/g, "!");

  // ** power
  js = js.replace(/(\w+)\s*\*\*\s*(\w+)/g, "Math.pow($1,$2)");

  // range(n) → Array.from({length:n},(_, i)=>i)
  // range(a,b) → Array.from({length:b-a},(_, i)=>a+i)
  // range(a,b,s) → manual
  js = js.replace(/range\(([^)]+)\)/g, (_, args) => {
    const parts = args.split(",").map(a => a.trim());
    if (parts.length === 1) return `__range__(0,${parts[0]},1)`;
    if (parts.length === 2) return `__range__(${parts[0]},${parts[1]},1)`;
    return `__range__(${parts[0]},${parts[1]},${parts[2]})`;
  });

  // for x in y: → for (const x of y) {
  // for x, y in y.items(): skip (not supported)
  js = js.replace(/for\s+(\w+)\s+in\s+([^\n:]+):/g, "for (const $1 of $2) {");

  // while cond:
  js = js.replace(/while\s+([^\n:]+):/g, "while ($1) {");

  // if/elif/else
  js = js.replace(/elif\s+([^\n:]+):/g, "} else if ($1) {");
  js = js.replace(/if\s+([^\n:]+):/g, "if ($1) {");
  js = js.replace(/else\s*:/g, "} else {");

  // def fname(params):
  js = js.replace(/def\s+(\w+)\s*\(([^)]*)\)\s*:/g, "function $1($2) {");

  // return
  js = js.replace(/\breturn\b/g, "return");

  // .append(
  js = js.replace(/\.append\(/g, ".push(");
  js = js.replace(/\.remove\(/g, ".__remove__(");

  // len()
  js = js.replace(/\blen\s*\(/g, "__len__(");

  // Convert indentation-based blocks to braces
  // This is the tricky part — use a line-by-line approach
  js = convertIndents(js);

  const rangeHelper = (a, b, s) => {
    const r = [];
    if (s > 0) { for (let i = a; i < b; i += s) r.push(i); }
    else if (s < 0) { for (let i = a; i > b; i += s) r.push(i); }
    return r;
  };

  try {
    const fn = new Function(
      "__print__", "__range__", "__len__",
      js
    );
    fn(
      printFn,
      rangeHelper,
      (x) => Array.isArray(x) ? x.length : String(x).length
    );
  } catch(e) {
    return { ok: false, output: e.message };
  }
  return { ok: true, output };
}

function convertIndents(code) {
  const lines = code.split("\n");
  const result = [];
  const indentStack = [0];

  for (let line of lines) {
    if (!line.trim()) { result.push(""); continue; }
    const indent = line.match(/^(\s*)/)[1].length;
    const content = line.trim();

    // Close blocks for dedents
    while (indentStack.length > 1 && indent < indentStack[indentStack.length - 1]) {
      indentStack.pop();
      result.push("}");
    }

    // If this line opens a block (ends with {) push new indent
    if (content.endsWith("{")) {
      result.push(" ".repeat(indent) + content);
      indentStack.push(indent + 4);
    } else {
      result.push(" ".repeat(indent) + content);
    }
  }

  // Close remaining blocks
  while (indentStack.length > 1) {
    indentStack.pop();
    result.push("}");
  }

  return result.join("\n");
}

/* ═══════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════ */
function totalExercises() {
  return curriculum.reduce((acc, ch) => acc + ch.exercises.length, 0);
}

function completedCount() {
  return Object.values(state.completed).reduce((acc, ch) =>
    acc + Object.values(ch).filter(Boolean).length, 0);
}

function isChapterDone(ch) {
  return ch.exercises.every((_, i) => state.completed[ch.id][i]);
}

function isChapterUnlocked(idx) {
  if (idx === 0) return true;
  return isChapterDone(curriculum[idx - 1]);
}

function renderSidebar() {
  const sb = document.getElementById("sidebar");
  sb.innerHTML = `<div class="sidebar-label">Chapitres</div>`;
  curriculum.forEach((ch, i) => {
    const done = isChapterDone(ch);
    const unlocked = isChapterUnlocked(i);
    const active = i === state.currentChapter;
    let cls = "chapter-btn";
    if (active) cls += " active";
    else if (done) cls += " done";
    else if (!unlocked) cls += " locked";

    const completedInChapter = ch.exercises.filter((_, j) => state.completed[ch.id][j]).length;

    sb.innerHTML += `
      <div class="sidebar-section">
        <button class="${cls}" onclick="goChapter(${i})" ${!unlocked && !active ? "disabled" : ""}>
          <span class="ch-icon">${done ? "✓" : ch.icon}</span>
          <span style="flex:1">${ch.title}</span>
          <span style="font-size:11px;opacity:0.7">${completedInChapter}/${ch.exercises.length}</span>
        </button>
      </div>`;
  });
}

function renderMain() {
  const ch = curriculum[state.currentChapter];
  const step = state.currentStep;
  const ex = ch.exercises[step];
  const chDone = isChapterDone(ch);
  const key = `${ch.id}_${step}`;
  const exDone = state.completed[ch.id][step];

  let html = `
    <div class="notion-header">
      <div class="notion-tag">📚 ${ch.tag}</div>
      <h1 class="notion-title">${ch.title}</h1>
      <p class="notion-desc">${ch.description}</p>
    </div>

    <div class="concept-box">
      <h3>⚡ Exemple de syntaxe</h3>
      <pre>${ch.concept}</pre>
    </div>

    <div class="steps-nav">
      ${ch.exercises.map((e, i) => {
        const done = state.completed[ch.id][i];
        const active = i === step;
        let cls = "step-pill";
        if (active) cls += " active";
        else if (done) cls += " done";
        return `<div class="${cls}" onclick="goStep(${i})">
          <span class="step-dot">${done ? "✓" : i + 1}</span>
          Exercice ${i + 1}
        </div>`;
      }).join("")}
    </div>
  `;

  const levelLabel = { easy: "Débutant", medium: "Intermédiaire", hard: "Avancé" }[ex.level];
  const levelClass = { easy: "badge-easy", medium: "badge-medium", hard: "badge-hard" }[ex.level];

  html += `
    <div class="ex-card" id="ex-card">
      <div class="ex-header">
        <div>
          <div class="ex-badge ${levelClass}">${levelLabel}</div>
          <div class="ex-title">${ex.title}</div>
          <div class="ex-desc">${ex.desc}</div>
        </div>
      </div>

      <div class="editor-wrap">
        <div class="editor-toolbar">
          <div class="editor-dots">
            <span style="background:#f06a6a"></span>
            <span style="background:#f7c06a"></span>
            <span style="background:#4fd1a5"></span>
          </div>
          <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)">main.py</span>
        </div>
        <textarea class="code-editor" id="code-editor" spellcheck="false" autocorrect="off">${ex.starter}</textarea>
        <div class="editor-actions">
          <button class="btn-run" onclick="runCode()">▶ Exécuter</button>
          <button class="btn-hint" onclick="toggleHint('${key}')">💡 Indice</button>
          <button class="btn-reset" title="Réinitialiser" onclick="resetCode()">↺</button>
        </div>
      </div>

      <div class="hint-box ${state.hintShown[key] ? 'visible' : ''}" id="hint-box">
        💡 ${ex.hint}
      </div>

      <div class="output-box" id="output-box">
        <div class="output-header info" id="output-header">▶ Sortie</div>
        <div class="output-content" id="output-content"></div>
      </div>

      <div class="success-banner ${exDone ? 'visible' : ''}" id="success-banner">
        <span class="success-icon">🎉</span>
        <div class="success-text">
          <strong>Exercice réussi !</strong>
          ${ex.successMsg}
        </div>
        ${step < ch.exercises.length - 1
          ? `<button class="btn-next" onclick="goStep(${step + 1})">Suivant →</button>`
          : (state.currentChapter < curriculum.length - 1
            ? `<button class="btn-next" onclick="goChapter(${state.currentChapter + 1})">Prochain chapitre →</button>`
            : `<button class="btn-next" onclick="showCompletion()">Terminer 🏆</button>`
          )
        }
      </div>
    </div>

    <div class="completion-card" id="completion-card">
      <div class="big-icon">🏆</div>
      <h2>Chapitre terminé !</h2>
      <p>Tu maîtrises maintenant les ${ch.title.toLowerCase()} en Python. Continue sur ta lancée !</p>
    </div>
  `;

  if (chDone && step === ch.exercises.length - 1) {
    html += ``;
  }

  document.getElementById("main-content").innerHTML = html;

  // Set cursor at end of editor
  const ed = document.getElementById("code-editor");
  if (ed) {
    ed.addEventListener("keydown", e => {
      if (e.key === "Tab") {
        e.preventDefault();
        const s = ed.selectionStart, end = ed.selectionEnd;
        ed.value = ed.value.substring(0, s) + "    " + ed.value.substring(end);
        ed.selectionStart = ed.selectionEnd = s + 4;
      }
    });
    ed.setSelectionRange(ed.value.length, ed.value.length);
    ed.focus();
  }

  updateProgress();
}

function updateProgress() {
  const total = totalExercises();
  const done = completedCount();
  document.getElementById("progress-label").textContent = `${done} / ${total} exercices`;
  document.getElementById("global-bar").style.width = `${(done / total) * 100}%`;
}

/* ═══════════════════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════════════════ */
function goChapter(idx) {
  if (!isChapterUnlocked(idx)) return;
  state.currentChapter = idx;
  state.currentStep = 0;
  renderSidebar();
  renderMain();
  window.scrollTo(0, 0);
}

function goStep(idx) {
  state.currentStep = idx;
  renderMain();
  window.scrollTo(0, 0);
}

function resetCode() {
  const ch = curriculum[state.currentChapter];
  const ex = ch.exercises[state.currentStep];
  document.getElementById("code-editor").value = ex.starter;
}

function toggleHint(key) {
  state.hintShown[key] = !state.hintShown[key];
  const hb = document.getElementById("hint-box");
  hb.classList.toggle("visible", state.hintShown[key]);
}

function runCode() {
  const code = document.getElementById("code-editor").value;
  const ch = curriculum[state.currentChapter];
  const ex = ch.exercises[state.currentStep];

  const result = runPython(code);
  const outBox = document.getElementById("output-box");
  const outHdr = document.getElementById("output-header");
  const outContent = document.getElementById("output-content");

  outBox.classList.add("visible");
  outContent.textContent = result.output || "(aucune sortie)";

  if (!result.ok) {
    outHdr.className = "output-header error";
    outHdr.textContent = "✗ Erreur";
    return;
  }

  const passed = ex.test(result.output);

  if (passed) {
    outHdr.className = "output-header success";
    outHdr.textContent = "✓ Sortie";
    state.completed[ch.id][state.currentStep] = true;
    document.getElementById("success-banner").classList.add("visible");
    renderSidebar();
    updateProgress();
  } else {
    outHdr.className = "output-header info";
    outHdr.textContent = "▶ Sortie";
  }
}

function showCompletion() {
  const card = document.getElementById("completion-card");
  if (card) card.classList.add("visible");
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
renderSidebar();
renderMain();
</script>
</body>
</html>
